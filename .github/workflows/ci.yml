name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: smoketeam/steak

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: docker-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" && -n "${{ secrets.DOCKER_PASSWORD }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets are not configured. Skipping image push."
          fi

      - name: Set Docker tags
        if: steps.docker-secrets.outputs.enabled == 'true'
        id: docker-tags
        shell: bash
        run: |
          {
            echo "value<<EOF"
            echo "${DOCKER_IMAGE}:latest"
            echo "${DOCKER_IMAGE}:${GITHUB_RUN_NUMBER}"
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "${DOCKER_IMAGE}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Publish to Docker Hub
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker-tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
