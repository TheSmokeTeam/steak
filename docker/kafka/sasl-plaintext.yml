services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: steak-kafka
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@steak-kafka:29093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://steak-kafka:29093,INTERNAL://steak-kafka:29092
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:29092,INTERNAL://steak-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_SASL__PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin" user_admin="admin";'
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
    volumes:
      - ../../kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "steak-kafka:29092", "--list"]
      interval: 5s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/init-topics-and-users.sh"]
    environment:
      STEAK_BOOTSTRAP_SERVER: steak-kafka:29092
      STEAK_CREATE_SCRAM_USER: "true"
      STEAK_SCRAM_USERNAME: admin
      STEAK_SCRAM_PASSWORD: admin
    volumes:
      - ./init-topics-and-users.sh:/scripts/init-topics-and-users.sh:ro
